name: Build and deploy Zola website
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger it if needed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # CRUCIAL: This pulls in Anemone
      - name: build
        uses: getzola/github-pages@v1
        with:
          zola_version: 0.19.2 # Or whatever version you have on Arch

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
# Re-triggering build with clean submodule URL
